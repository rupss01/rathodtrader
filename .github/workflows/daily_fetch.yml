name: NSE FII-DII Daily Fetch

on:
  schedule:
    - cron: '30 13 * * 1-5' # Roz sham 7:00 PM IST (Mon-Fri) par chalega
  workflow_dispatch: # Manual run karne ke liye button dega

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/set-up-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Fetch Script
        run: python fetch_data.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/
          git commit -m "Auto-update NSE data" || exit 0
          git push
